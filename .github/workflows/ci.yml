name: CI/CD

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    unit_tests:
        name: Unit Tests
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v5

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.4'

            - name: Cache composer dependencies
              uses: actions/cache@v5
              with:
                  path: vendor
                  key: composer-${{ hashFiles('composer.lock') }}
                  restore-keys: composer-

            - name: Install composer dependencies
              run: composer install --no-interaction --prefer-dist --no-progress

            - name: Run unit tests
              run: php bin/phpunit --testsuite unit --testdox

    integration_tests:
        name: Integration Tests
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v5

            - name: Start services
              run: docker compose up -d --build --wait astro db redis

            - name: Install dependencies and setup database
              run: |
                  docker compose exec -T astro composer install --no-interaction --prefer-dist --no-progress
                  docker compose exec -T db mysql -uroot -prootpassword -e "CREATE DATABASE IF NOT EXISTS free_astro_test; GRANT ALL PRIVILEGES ON free_astro_test.* TO 'fen_user'@'%'; FLUSH PRIVILEGES;"
                  docker compose exec -T astro php bin/console doctrine:migrations:migrate --no-interaction --env=test
                  docker compose exec -T astro php bin/console app:seed --env=test

            - name: Run integration tests
              run: docker compose exec -T astro php bin/phpunit --testsuite integration --testdox

            - name: Stop all services
              if: always()
              run: docker compose down

    build_deploy:
        name: CD Build Image
        runs-on: ubuntu-latest
        needs: [unit_tests, integration_tests]
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        steps:
            - uses: actions/checkout@v5

            - name: Build production image
              run: docker build -t astro-app:${{ github.sha }} ./local
