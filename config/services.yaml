# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

parameters: {}
services:
    _defaults:
        autowire: true
        autoconfigure: true

    App\:
        resource: '../src/'
    App\App\Contracts\Gateway\PdfGeneratorInterface:
        class: App\Infra\Adapters\Gateway\HtmlToPdfGenerator
        arguments:
            $projectDir: '%kernel.project_dir%'
