services:
    astro:
        build: ./local
        image: php:public
        container_name: astro
        command: ./local/symfony.sh
        volumes:
            - ./:/var/www/html
        ports:
            - "8000:8000"
        depends_on:
            - db
    db:
        image: mysql:8.0
        container_name: astro_db
        environment:
            MYSQL_ROOT_PASSWORD: rootpassword
            MYSQL_DATABASE: free_astro
            MYSQL_USER: fen_user
            MYSQL_PASSWORD: fen_password
        ports:
            - "3306:3306"
        volumes:
            - db_data:/var/lib/mysql
    rabbitmq:
        image: rabbitmq:4.2-management
        container_name: astro_rabbitmq
        environment:
            RABBITMQ_DEFAULT_USER: astro_user
            RABBITMQ_DEFAULT_PASS: astro_password
        ports:
            - "5672:5672"
            - "15672:15672"
        volumes:
            - rabbitmq_data:/var/lib/rabbitmq
    mongodb:
        image: mongo:8.0.21-rc0-noble
        container_name: astro_mongodb
        environment:
            MONGO_INITDB_ROOT_USERNAME: astro_user
            MONGO_INITDB_ROOT_PASSWORD: astro_password
            MONGO_INITDB_DATABASE: free_astro
        ports:
            - "27017:27017"
        volumes:
            - mongodb_data:/data/db
volumes:
    db_data:
    rabbitmq_data:
    mongodb_data:
